<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Splash Screen Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    /* Reset */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* Splash screen covers whole viewport */
    #splash {
      position: fixed;
      inset: 0;
      background: #050816;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: #fff;
      z-index: 9999;
      animation: fadeOut 0.5s ease forwards;
      animation-delay: 2.5s; /* how long it stays visible */
    }

    .logo {
      font-size: 2rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      animation: logoPop 1s ease-in-out infinite alternate;
    }

    .loader-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #915eff;
      margin-top: 16px;
      animation: bounce 0.6s infinite alternate;
    }

    @keyframes logoPop {
      from { transform: scale(1);   opacity: 0.7; }
      to   { transform: scale(1.1); opacity: 1;   }
    }

    @keyframes bounce {
      from { transform: translateY(4px); opacity: 0.6; }
      to   { transform: translateY(-4px); opacity: 1;  }
    }

    @keyframes fadeOut {
      to { opacity: 0; visibility: hidden; }
    }

    /* Main content hidden until splash ends (JS will switch this) */
    #main {
      min-height: 100vh;
      background: linear-gradient(135deg, #050816, #151030);
      color: #fff;
      display: none;
      padding: 40px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
  </style>
</head>
<body>
  <!-- Splash / intro screen -->
  <div id="splash">
    <div class="logo">MY PORTFOLIO</div>
    <div class="loader-dot"></div>
  </div>

  <!-- Real page -->
  <div id="main">
    <h1>Welcome to the main page</h1>
    <p>This is your normal landing page content.</p>
  </div>

  <script>
    // Wait until page is loaded
    window.addEventListener("load", function () {
      const splash = document.getElementById("splash");
      const main = document.getElementById("main");

      // Show main page after the splash animation delay (match CSS delay + duration)
      setTimeout(function () {
        splash.style.display = "none";
        main.style.display = "block";
      }, 3000); // 2.5s delay + 0.5s fadeOut animation
    });
  </script>
</body>
</html>
